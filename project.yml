name: BabyLog
options:
  bundleIdPrefix: com.vibelab
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
targets:
  BabyLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/Sources
      - App/Resources/Assets.xcassets
      # 외부 API 키(깃 제외). 없으면 자동 Mock 폴백 — fresh checkout/CI 대비 optional.
      - path: App/Resources/Secrets.plist
        optional: true
        buildPhase: resources
    dependencies:
      - target: BabyLogWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelab.babylog
        INFOPLIST_FILE: App/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # ── 유료 계정 연동 시 활성화 ───────────────────────────────────────
        # App Group(위젯 실데이터) / iCloud·CloudKit(가족 백업)은 유료 개발자 계정 +
        # 포털 Capability 등록(App Group: group.com.babylog.app, iCloud 컨테이너: iCloud.com.babylog.app) 필요.
        # 1) 아래 엔타이틀먼트 주석 해제 (App Group + iCloud/CloudKit 키 포함):
        # (단, 아래 configs의 push 엔타이틀먼트를 BabyLog.entitlements로 교체해야 함)
        # 2) CloudKit 동기화 코드 활성화 — 컴파일 플래그 추가:
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) BL_CLOUDKIT
        # (그러면 CloudSyncService가 실제 CKContainer로 동작하고 설정에 백업/복원 노출)
      # 실시간 크루 오픈 푸시(APNs) — aps-environment를 빌드 구성별로 자동 선택해
      # 출시 시 수동 전환 불필요. Debug=development(샌드박스) / Release=production.
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: App/Resources/BabyLog.push.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: App/Resources/BabyLog.push.production.entitlements
  BabyLogWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Widget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelab.babylog.widget
        INFOPLIST_FILE: Widget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # App Group 활성화 시 주석 해제 (App 타겟과 동일 그룹)
        # CODE_SIGN_ENTITLEMENTS: Widget/BabyLogWidget.entitlements
  BabyLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BabyLogTests
    dependencies:
      - target: BabyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibelab.babylog.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BabyLog:
    build:
      targets:
        BabyLog: all
        BabyLogTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BabyLogTests
    archive:
      config: Release
