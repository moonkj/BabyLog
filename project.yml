name: BabyLog
options:
  bundleIdPrefix: com.babylog
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
targets:
  BabyLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babylog.app
        INFOPLIST_FILE: App/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
  BabyLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BabyLogTests
    dependencies:
      - target: BabyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babylog.app.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BabyLog:
    build:
      targets:
        BabyLog: all
        BabyLogTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BabyLogTests
    archive:
      config: Release
