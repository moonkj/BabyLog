name: BabyLog
options:
  bundleIdPrefix: com.babylog
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
targets:
  BabyLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/Sources
      - App/Resources/Assets.xcassets
    dependencies:
      - target: BabyLogWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babylog.app
        INFOPLIST_FILE: App/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Group(group.com.babylog.app)는 유료 개발자 계정 + 포털 Capability 등록 필요.
        # 계정 활성화 후 아래 라인 주석 해제하면 위젯 실데이터(공유 컨테이너)가 켜진다.
        # CODE_SIGN_ENTITLEMENTS: App/Resources/BabyLog.entitlements
  BabyLogWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Widget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babylog.app.widget
        INFOPLIST_FILE: Widget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # App Group 활성화 시 주석 해제 (App 타겟과 동일 그룹)
        # CODE_SIGN_ENTITLEMENTS: Widget/BabyLogWidget.entitlements
  BabyLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/BabyLogTests
    dependencies:
      - target: BabyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babylog.app.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BabyLog:
    build:
      targets:
        BabyLog: all
        BabyLogTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BabyLogTests
    archive:
      config: Release
